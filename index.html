<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In / Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="toggle-container">
                <button id="toggle-signin" class="active" onclick="showSignIn()">Sign In</button>
                <button id="toggle-signup" onclick="showSignUp()">Sign Up</button>
            </div>

            <!-- Sign In Form -->
            <form id="signin-form" class="auth-form" onsubmit="handleSignIn(event)">
                <h2>Welcome Back</h2>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="signin-email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signin-password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="submit-btn">Sign In</button>
            </form>

            <!-- Sign Up Form -->
            <form id="signup-form" class="auth-form hidden" onsubmit="handleSignUp(event)">
                <h2>Create Account</h2>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="Enter your name">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" required placeholder="Create a password">
                </div>
                <button type="submit" class="submit-btn">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
